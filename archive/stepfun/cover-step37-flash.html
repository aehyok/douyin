<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 768px; overflow: hidden; }
  .stage {
    position: relative;
    width: 1024px; height: 768px;
    background: url('cover-step37-flash.png') center/cover no-repeat;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }
  /* 左侧加一层从左到右渐隐的暗化，保证白字在紫底上更稳 */
  .scrim {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, rgba(40,22,80,0.55) 0%, rgba(40,22,80,0.30) 42%, rgba(40,22,80,0) 62%);
  }
  .title-wrap {
    position: absolute;
    left: 64px; top: 50%; transform: translateY(-50%);
    width: 600px;
    color: #fff;
  }
  .kicker {
    display: inline-block;
    font-size: 22px; font-weight: 700; letter-spacing: 2px;
    color: #2a1650;
    background: #f6c945;
    padding: 7px 16px; border-radius: 999px;
    margin-bottom: 26px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
  }
  .main {
    font-size: 72px; font-weight: 900; line-height: 1.18;
    letter-spacing: 1px;
    text-shadow: 0 4px 22px rgba(20,8,50,0.55);
  }
  .main .hl { color: #ffd24a; }
  .rule {
    width: 88px; height: 6px; border-radius: 3px;
    background: #ff7a59;
    margin: 30px 0 26px;
    box-shadow: 0 4px 14px rgba(255,122,89,0.5);
  }
  .sub {
    font-size: 30px; font-weight: 600; line-height: 1.55;
    color: #f3ecff;
    text-shadow: 0 3px 14px rgba(20,8,50,0.5);
  }
  .sub .em { color: #ffd24a; font-weight: 800; }
</style>
</head>
<body>
  <div class="stage">
    <div class="scrim"></div>
    <div class="title-wrap">
      <span class="kicker">实测 · Claude Code 工作流</span>
      <div class="main">不是大模型<br><span class="hl">胜似大模型</span></div>
      <div class="rule"></div>
      <div class="sub"><span class="em">Step 3.7 Flash</span> 在 Claude Code<br>工作流里的表现不俗</div>
    </div>
  </div>
</body>
</html>
