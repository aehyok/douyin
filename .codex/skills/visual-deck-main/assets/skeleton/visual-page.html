<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>视觉页（路线B：图当底 + HTML叠字）</title>
<!--
  用法：
  1. 把 BG.png 换成 imgen 出的「留白底图」（主体一侧、另一侧留白、无文字）
  2. titlebox 的 margin-left（留白侧）+ 父级 flex 居中决定位置；用 flex 居中，不用 transform 居中（坑#8）
  3. 所有字号用 vw，全屏任何比例都等比缩放、不被裁
  关键：底图 cover 铺满整个视口 → 无留白、无色差（坑#4）；叠字背后若有色差，给底图加一层 90deg 水平遮罩（坑#4），别用斜向角度
-->
<style>
:root{--accent:#f6c945;--font:"Yuanti SC","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;margin:0;overflow:hidden;background:#7a5ce0}
/* 底图铺满 + flex 居中标题。组合进 deck 时 .slide 基类是 column，务必保留 flex-direction:row（坑#9） */
.slide{position:fixed;inset:0;background:url("BG.png") center center/cover no-repeat;
  display:flex;flex-direction:row;align-items:center;justify-content:flex-start}
.titlebox{position:relative;margin-left:9%;max-width:62%}
.title{font-size:7.8vw;font-weight:900;color:#fff;line-height:1.04;font-family:var(--font);
  -webkit-text-stroke:0.5vw #6a4fd0;paint-order:stroke fill;
  text-shadow:0 0.4vw 0 rgba(80,55,180,.5),0 0.8vw 1vw rgba(60,40,140,.42)}
.title .em{color:var(--accent);-webkit-text-stroke:0.5vw #c98a14}
.sub{display:inline-block;margin-top:1.7vw;background:#6a4fd0;color:#fff;font-size:2.4vw;font-weight:800;
  font-family:var(--font);padding:1vw 2.4vw;border-radius:1.4vw;
  box-shadow:inset 0 0.2vw 0.5vw rgba(255,255,255,.25),0 0.6vw 1.1vw rgba(60,40,140,.35)}
</style>
</head>
<body>
  <div class="slide">
    <div class="titlebox">
      <div class="title">主标题<br><span class="em">高亮词</span></div>
      <div><span class="sub">副标题占位</span></div>
    </div>
  </div>
</body>
</html>
